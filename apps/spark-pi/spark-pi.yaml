apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-lance-gcs
  namespace: spark-jobs
spec:
  type: Python
  mode: cluster
  image: "spark-lance-gcs:3.5.0"
  imagePullPolicy: IfNotPresent
  mainApplicationFile: "local:///opt/spark/scripts/job.py"
  sparkVersion: "3.5.0"
  timeToLiveSeconds: 300
  restartPolicy:
    type: Never
  sparkConf:
    "spark.hadoop.fs.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem"
    "spark.hadoop.fs.AbstractFileSystem.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS"
    "spark.hadoop.google.cloud.auth.type": "APPLICATION_DEFAULT"
    "spark.sql.catalog.lance": "org.lance.spark.LanceNamespaceSparkCatalog"
    "spark.sql.catalog.lance.impl": "dir"
    "spark.sql.catalog.lance.root": "gs://thiagos-lake"
    "spark.sql.extensions": "org.lance.spark.extensions.LanceSparkSessionExtensions"
  volumes:
    - name: script
      configMap:
        name: spark-lance-script
    - name: gcs-adc
      secret:
        secretName: gcs-adc
  driver:
    cores: 1
    memory: "2g"
    serviceAccount: spark
    env:
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /var/secrets/google/application_default_credentials.json
      - name: GCS_BUCKET
        value: thiagos-lake
    volumeMounts:
      - name: script
        mountPath: /opt/spark/scripts
      - name: gcs-adc
        mountPath: /var/secrets/google

  executor:
    cores: 1
    instances: 2
    memory: "3g"
    env:
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /var/secrets/google/application_default_credentials.json
      - name: GCS_BUCKET
        value: thiagos-lake
    volumeMounts:
      - name: gcs-adc
        mountPath: /var/secrets/google
